<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FriendChat — Interactive Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* ── Reset & base ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',system-ui,sans-serif;font-size:14px;background:#f8f9fb;color:#111827;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:inherit;border:none;background:none}
input{font-family:inherit}
::selection{background:#e0e9ff;color:#3730a3}
:focus-visible{outline:2px solid #4f46e5;outline-offset:2px;border-radius:4px}
:focus:not(:focus-visible){outline:none}

/* ── Design tokens ── */
:root{
  --brand-50:#f0f4ff;--brand-100:#e0e9ff;--brand-200:#c7d7fe;--brand-500:#6366f1;--brand-600:#4f46e5;--brand-700:#4338ca;
  --surface:#fff;--surface-subtle:#f8f9fb;--surface-muted:#f1f3f7;
  --ink:#111827;--ink-muted:#6b7280;--ink-faint:#9ca3af;--ink-ghost:#d1d5db;
  --success:#10b981;--danger:#ef4444;--warning:#f59e0b;--info:#3b82f6;
  --radius:8px;--radius-lg:12px;--radius-xl:16px;--radius-2xl:20px;
  --shadow-card:0 1px 3px 0 rgb(0 0 0/.06),0 1px 2px -1px rgb(0 0 0/.04);
  --shadow-card-hover:0 4px 12px 0 rgb(0 0 0/.08);
  --shadow-modal:0 20px 60px -10px rgb(0 0 0/.18);
}

/* ── Layout shell ── */
#app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:68px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;border-right:1px solid #f3f4f6;background:#fff;padding:16px 0;gap:4px}
.main-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── Auth page ── */
.auth-page{
  position:fixed;inset:0;
  background:linear-gradient(135deg,#f0f4ff 0%,#f8f9fb 50%,#f1f3f7 100%);
  display:flex;align-items:center;justify-content:center;
  padding:24px;
  overflow-y:auto;
  z-index:100;
}
.auth-inner{
  width:100%;
  max-width:420px;
  margin:auto;
  animation:fadeIn .2s ease;
}
.auth-card{
  width:100%;
  background:#fff;
  border-radius:var(--radius-2xl);
  box-shadow:var(--shadow-modal);
  border:1px solid #f3f4f6;
  padding:40px;
}
@media(max-width:480px){
  .auth-card{padding:28px 24px;}
}
.auth-logo{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:32px}
.auth-logo-mark{width:56px;height:56px;border-radius:var(--radius-xl);background:var(--brand-600);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgb(79 70 229/.3),0 0 0 4px #e0e9ff;color:#fff;font-size:18px;font-weight:700;letter-spacing:-.5px}

/* ── Sidebar ── */
.logo-mark{width:36px;height:36px;border-radius:var(--radius-lg);background:var(--brand-600);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;box-shadow:0 2px 8px rgb(79 70 229/.3);margin-bottom:8px;flex-shrink:0}
.nav-group{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.nav-btn{position:relative;width:40px;height:40px;border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;color:var(--ink-muted);transition:all .15s;flex-shrink:0}
.nav-btn:hover{background:var(--surface-muted);color:var(--ink)}
.nav-btn.active{background:var(--brand-600);color:#fff;box-shadow:0 2px 8px rgb(79 70 229/.3)}
.nav-badge{position:absolute;top:-2px;right:-2px;min-width:16px;height:16px;border-radius:8px;background:var(--danger);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid #fff}
.sidebar-bottom{display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:8px}
.avatar-sm{width:32px;height:32px;border-radius:50%;overflow:hidden;background:var(--brand-100);display:flex;align-items:center;justify-content:center;color:var(--brand-700);font-size:12px;font-weight:600;flex-shrink:0}
.logout-btn{width:36px;height:36px;border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;color:var(--ink-muted);transition:all .15s}
.logout-btn:hover{background:var(--surface-muted);color:var(--ink)}

/* ── Page header ── */
.page-header{border-bottom:1px solid #f3f4f6;background:#fff;padding:16px 24px;flex-shrink:0}
.page-header h1{font-size:15px;font-weight:600;color:var(--ink)}
.page-header p{font-size:13px;color:var(--ink-muted);margin-top:2px}
.page-content{flex:1;overflow-y:auto;padding:16px 24px;scrollbar-width:thin;scrollbar-color:#d1d5db transparent}

/* ── Search input ── */
.search-wrap{position:relative;margin-top:12px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--ink-faint);pointer-events:none}
.search-input{height:36px;width:100%;max-width:320px;border-radius:var(--radius-lg);border:1px solid #e5e7eb;background:var(--surface-muted);padding:0 32px 0 36px;font-size:13px;color:var(--ink);transition:all .15s}
.search-input::placeholder{color:var(--ink-faint)}
.search-input:focus{border-color:var(--brand-500);background:#fff;box-shadow:0 0 0 3px rgb(99 102 241/.12)}

/* ── Card ── */
.card{border-radius:var(--radius-xl);background:#fff;box-shadow:var(--shadow-card);border:1px solid #f3f4f6;transition:box-shadow .15s,border-color .15s}
.card:hover{box-shadow:var(--shadow-card-hover);border-color:var(--brand-200)}

/* ── User grid ── */
.user-grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
.user-card{display:flex;align-items:center;gap:12px;padding:16px}
.avatar-md{width:44px;height:44px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;flex-shrink:0;position:relative}
.presence-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;border:2px solid #fff}
.presence-dot.online{background:var(--success)}
.presence-dot.offline{background:#d1d5db}
.user-info{flex:1;min-width:0}
.user-name{font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-handle{font-size:12px;color:var(--ink-muted)}
.user-status-line{font-size:11px;margin-top:2px}
.user-status-line.online{color:var(--success)}
.user-status-line.offline{color:var(--ink-faint)}

/* ── Status pills ── */
.pill{display:inline-flex;align-items:center;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:500}
.pill-friends{background:#d1fae5;color:#065f46;border:1px solid #a7f3d0}
.pill-pending{background:#fef3c7;color:#78350f;border:1px solid #fde68a}
.pill-received{background:#dbeafe;color:#1e3a8a;border:1px solid #93c5fd}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:var(--radius);font-size:13px;font-weight:500;transition:all .15s;flex-shrink:0}
.btn-sm{height:32px;padding:0 12px;font-size:12px;border-radius:var(--radius)}
.btn-md{height:36px;padding:0 16px}
.btn-lg{height:44px;padding:0 20px;font-size:15px}
.btn-primary{background:var(--brand-600);color:#fff;box-shadow:0 1px 2px rgb(0 0 0/.1)}
.btn-primary:hover{background:var(--brand-700)}
.btn-secondary{background:var(--surface-muted);color:var(--ink);border:1px solid #e5e7eb}
.btn-secondary:hover{background:#e9ebf0}
.btn-danger{background:#fee2e2;color:#7f1d1d;border:1px solid #fecaca}
.btn-danger:hover{background:#fecaca}
.btn-full{width:100%}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{color:var(--ink-muted)}
.btn-ghost:hover{background:var(--surface-muted);color:var(--ink)}

/* ── Friend request cards ── */
.request-list{display:flex;flex-direction:column;gap:12px;max-width:560px}
.req-card{display:flex;align-items:center;gap:14px;padding:16px}
.req-meta{font-size:11px;color:var(--ink-muted);margin-top:2px}
.req-actions{display:flex;gap:8px;flex-shrink:0}
.settled-card{display:flex;align-items:center;gap:10px;padding:12px 16px;animation:fadeIn .25s ease}
.settled-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.settled-accepted .settled-icon{background:#d1fae5;color:#065f46}
.settled-rejected .settled-icon{background:#f3f4f6;color:var(--ink-muted)}
.settled-text{font-size:13px;color:var(--ink-muted)}

/* ── Realtime badge ── */
.realtime-indicator{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:11px;color:var(--ink-muted)}
.realtime-dot{width:6px;height:6px;border-radius:50%;background:var(--success);animation:pulse 2s cubic-bezier(.4,0,.6,1) infinite}

/* ── Conversations layout ── */
.conv-shell{display:flex;height:100%;overflow:hidden}
.conv-sidebar{width:280px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid #f3f4f6;background:#fff}
.conv-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--surface-subtle)}
.conv-list{flex:1;overflow-y:auto;padding:8px 4px;scrollbar-width:thin;scrollbar-color:#d1d5db transparent}
.conv-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-lg);cursor:pointer;transition:all .1s;margin:0 4px}
.conv-item:hover{background:var(--surface-muted)}
.conv-item.active{background:var(--brand-50)}
.conv-item-info{flex:1;min-width:0}
.conv-item-top{display:flex;align-items:center;justify-content:space-between;gap:4px}
.conv-item-name{font-size:13px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-item-name.bold{font-weight:700}
.conv-item-time{font-size:10px;color:var(--ink-faint);flex-shrink:0}
.conv-item-preview{font-size:12px;color:var(--ink-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-item.active .conv-item-name{color:var(--brand-700);font-weight:600}
.unread-badge{min-width:18px;height:18px;border-radius:9px;background:var(--brand-600);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;flex-shrink:0}

/* ── Chat panel ── */
.chat-header{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #f3f4f6;background:#fff;flex-shrink:0}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;scrollbar-width:thin;scrollbar-color:#d1d5db transparent}
.msg-row{display:flex;align-items:flex-end;gap:8px}
.msg-row.sent{flex-direction:row-reverse}
.msg-bubble{max-width:320px;padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.5;position:relative}
.msg-bubble.received{background:var(--surface-muted);color:var(--ink);border-bottom-left-radius:4px}
.msg-bubble.sent{background:var(--brand-600);color:#fff;border-bottom-right-radius:4px}
.msg-meta{font-size:10px;margin-top:4px;opacity:.65}
.msg-receipts{font-size:11px;margin-top:2px;opacity:.7;text-align:right}
.typing-row{display:flex;align-items:center;gap:8px}
.typing-bubble{background:var(--surface-muted);border-radius:16px;border-bottom-left-radius:4px;padding:10px 14px;display:flex;gap:4px;align-items:center}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--ink-faint);animation:typingPulse 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
.chat-input-area{border-top:1px solid #f3f4f6;background:#fff;padding:12px 16px;display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.chat-input{flex:1;min-height:40px;max-height:120px;border-radius:var(--radius-xl);border:1px solid #e5e7eb;background:var(--surface-muted);padding:10px 14px;font-size:13px;color:var(--ink);resize:none;line-height:1.4;transition:all .15s}
.chat-input:focus{border-color:var(--brand-500);background:#fff;box-shadow:0 0 0 3px rgb(99 102 241/.12)}
.send-btn{width:40px;height:40px;border-radius:50%;background:var(--brand-600);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 6px rgb(79 70 229/.3);transition:all .15s}
.send-btn:hover{background:var(--brand-700);transform:scale(1.05)}

/* ── Skeleton ── */
.skeleton{position:relative;overflow:hidden;border-radius:6px;background:#f1f3f7}
.skeleton::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent 25%,rgba(255,255,255,.7) 50%,transparent 75%);background-size:200% 100%;animation:shimmer 1.6s linear infinite}
@keyframes shimmer{from{background-position:-200% 0}to{background-position:200% 0}}

/* ── Toast ── */
.toast-stack{position:fixed;bottom:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{pointer-events:all;width:300px;border-radius:var(--radius-xl);background:#fff;box-shadow:var(--shadow-modal);overflow:hidden;animation:slideUp .2s ease;border:1px solid transparent}
.toast.success{border-color:#a7f3d0}
.toast.error{border-color:#fecaca}
.toast.info{border-color:#93c5fd}
.toast-body{display:flex;align-items:flex-start;gap:10px;padding:12px 14px}
.toast-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
.toast.success .toast-icon{background:#d1fae5;color:#065f46}
.toast.error   .toast-icon{background:#fee2e2;color:#7f1d1d}
.toast.info    .toast-icon{background:#dbeafe;color:#1e3a8a}
.toast-msg{flex:1;font-size:13px;font-weight:500;line-height:1.4;padding-top:3px}
.toast-close{background:none;border:none;color:var(--ink-faint);padding:2px;border-radius:4px;cursor:pointer;font-size:16px;line-height:1;flex-shrink:0}
.toast-progress{height:3px;background:#e5e7eb}
.toast-bar{height:100%;transition:width .1s linear}
.toast.success .toast-bar{background:#10b981}
.toast.error   .toast-bar{background:#ef4444}
.toast.info    .toast-bar{background:#3b82f6}

/* ── Input ── */
.input-wrap{display:flex;flex-direction:column;gap:6px}
.input-label{font-size:13px;font-weight:500;color:var(--ink)}
.input-field{height:40px;width:100%;border-radius:var(--radius);border:1px solid #e5e7eb;background:#fff;padding:0 12px;font-size:13px;color:var(--ink);transition:all .15s}
.input-field::placeholder{color:var(--ink-faint)}
.input-field:focus{border-color:var(--brand-500);box-shadow:0 0 0 3px rgb(99 102 241/.12)}
.input-field.error{border-color:var(--danger);box-shadow:0 0 0 3px rgb(239 68 68/.1)}
.input-error{font-size:11px;color:var(--danger)}
.input-hint{font-size:11px;color:var(--ink-muted)}

/* ── Password strength ── */
.pw-strength{margin-top:8px}
.pw-bars{display:flex;gap:4px;margin-bottom:4px}
.pw-bar{height:4px;flex:1;border-radius:2px;transition:background .3s}
.pw-label{font-size:11px;color:var(--ink-muted)}

/* ── Page tabs (top navigation demo) ── */
.page-tabs{display:flex;gap:4px;padding:0 24px;border-bottom:1px solid #f3f4f6;background:#fff;flex-shrink:0}
.page-tab{padding:12px 4px;font-size:13px;color:var(--ink-muted);border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px}
.page-tab:hover{color:var(--ink)}
.page-tab.active{color:var(--brand-600);border-bottom-color:var(--brand-600);font-weight:500}

/* ── Empty state ── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:64px 24px;text-align:center}
.empty-icon{width:64px;height:64px;border-radius:var(--radius-xl);background:var(--surface-muted);display:flex;align-items:center;justify-content:center}
.empty-title{font-size:14px;font-weight:600;color:var(--ink)}
.empty-body{font-size:13px;color:var(--ink-muted);max-width:280px;line-height:1.5}

/* ── Stats strip ── */
.stats-strip{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:4px}
.stat-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink-muted)}
.stat-dot{width:6px;height:6px;border-radius:50%}

/* ── Error alert ── */
.error-alert{display:flex;align-items:flex-start;gap:10px;border-radius:var(--radius-xl);background:#fee2e2;border:1px solid #fecaca;padding:12px 14px}
.error-alert-icon{color:var(--danger);flex-shrink:0;margin-top:1px}
.error-alert-text{font-size:13px;color:#7f1d1d}
.error-retry{font-size:12px;color:#7f1d1d;text-decoration:underline;cursor:pointer;margin-top:4px}

/* ── Animations ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes typingPulse{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
@keyframes scaleIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}

/* ── Demo top bar ── */
.demo-bar{background:var(--brand-600);color:#fff;text-align:center;font-size:12px;padding:6px;font-weight:500;flex-shrink:0}
.demo-bar span{opacity:.75;margin:0 4px}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:2px}
</style>
</head>
<body>

<div id="root" style="display:flex;flex-direction:column;height:100vh">
  <div class="demo-bar">
    FriendChat — Interactive UI Preview
    <span>·</span>
    Click the sidebar icons to switch pages
    <span>·</span>
    All interactions are live
  </div>
  <div id="app" style="flex:1;min-height:0"></div>
</div>

<!-- Toast container -->
<div class="toast-stack" id="toastStack"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════

];
const mockConversations = [
  { id:'c1', user:mockUsers[0], lastMsg:'See you tomorrow! 👋', time:'2m',  unread:3, online:true },
  { id:'c2', user:mockUsers[1], lastMsg:'Thanks for the help!',  time:'1h',  unread:0, online:true  },
  { id:'c3', user:{ id:'u10', name:'Zoe Adams', handle:'zoe_a', color:'#db2777', initials:'ZA', online:false }, lastMsg:'That sounds great', time:'3h', unread:1, online:false },

const mockMessages = {
  c1: [
    { id:'m1', text:'Hey Alice! How are you doing?',         sent:false, time:'10:31', receipts:'' },
    { id:'m2', text:'I\'m great, thanks! Just finished the project.',     sent:true,  time:'10:32', receipts:'✓✓' },
    { id:'m3', text:'Nice! Was it the CometChat assignment?', sent:false, time:'10:33', receipts:'' },

function showToast(msg, type='info', duration=3500) {
  const stack = document.getElementById('toastStack');
  const id = 'toast-' + Date.now();
  const icons = { success:'✓', error:'✕', info:'ℹ', warning:'⚠' };
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.id = id;
  el.innerHTML = `
    <div class="toast-body">
      <div class="toast-icon">${icons[type]||'ℹ'}</div>
      <div class="toast-msg">${msg}</div>
      <button class="toast-close" onclick="dismissToast('${id}')">×</button>
    </div>
    <div class="toast-progress"><div class="toast-bar" id="bar-${id}" style="width:100%"></div></div>`;
  stack.appendChild(el);

  let w = 100;
  const interval = setInterval(() => {
    w -= (100 / (duration / 100));
    const bar = document.getElementById('bar-' + id);
    if (bar) bar.style.width = Math.max(0, w) + '%';
    if (w <= 0) { clearInterval(interval); dismissToast(id); }
  }, 100);
}

function dismissToast(id) {
  const el = document.getElementById(id);
  if (el) { el.style.opacity='0'; el.style.transform='translateY(4px)'; setTimeout(() => el.remove(), 200); }
}

}

                </div>

            </div>`).join('')}
        </div>
      </div>

      <!-- Chat panel -->
      <div class="conv-panel">
        ${!activeConv ? `
          <div style="flex:1;display:flex;align-items:center;justify-content:center;background:var(--surface-subtle)">
            <div class="empty-state">
              <div class="empty-icon">${svgChat()}</div>
              <div class="empty-title">Select a conversation</div>
              <div class="empty-body">Choose a friend from the sidebar to start chatting.</div>
            </div>
          </div>` : `
          <!-- Chat header -->
          <div class="chat-header">
            ${avatar(activeMeta.user, 'sm', true)}
            <div>
              <div style="font-size:14px;font-weight:600;color:var(--ink)">${activeMeta.user.name}</div>
              <div style="font-size:11px;color:${activeMeta.online?'var(--success)':'var(--ink-muted)'}">
                ${activeMeta.online ? '● Online' : '○ Offline'}
              </div>
            </div>
            <div style="margin-left:auto;display:flex;gap:8px">
              <button class="btn btn-ghost" style="padding:6px 8px;border-radius:8px;font-size:12px" onclick="showToast('CometChat call feature available in the full app','info')">📞</button>
              <button class="btn btn-ghost" style="padding:6px 8px;border-radius:8px;font-size:12px" onclick="showToast('CometChat call feature available in the full app','info')">📹</button>
            </div>
          </div>

          <!-- Messages -->
          <div class="chat-messages" id="msgList">
            ${msgs.map(m => `
              <div class="msg-row ${m.sent?'sent':''}">
                ${!m.sent ? `<div class="avatar-sm" style="width:28px;height:28px;font-size:11px;background:${activeMeta.user.color}20;color:${activeMeta.user.color};flex-shrink:0">${activeMeta.user.initials}</div>` : ''}
                <div>
                  <div class="msg-bubble ${m.sent?'sent':'received'}">${m.text}</div>
                  <div class="msg-meta" style="text-align:${m.sent?'right':'left'}">${m.time} ${m.receipts?`<span title="${m.receipts==='✓✓'?'Delivered':m.receipts==='👁'?'Read':''}">${m.receipts}</span>`:''}</div>
                </div>
              </div>`).join('')}
            ${state.showTyping ? `
              <div class="typing-row">
                <div class="avatar-sm" style="width:28px;height:28px;font-size:11px;background:${activeMeta.user.color}20;color:${activeMeta.user.color};flex-shrink:0">${activeMeta.user.initials}</div>
                <div class="typing-bubble">
                  <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
                </div>
              </div>` : ''}
          </div>

          <!-- Input -->
          <div class="chat-input-area">
            <textarea id="msgInput" class="chat-input" placeholder="Message ${activeMeta.user.name}…" rows="1"
              oninput="autoResize(this);handleTyping()"
              onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
            <button class="send-btn" onclick="sendMessage()">${svgSend()}</button>
          </div>`}
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════════════════

function navigate(page) {
  if (page === 'requests') { state.requestUnread = 0; }
  state.page = page;
  renderApp();
  if (page === 'conversations') {
    setTimeout(scrollMessages, 50);
  }
}

function handleLogout() {
  state.loggedIn = false;
  state.page = 'login';
  state.activeConv = null;
  state.loginForm = { email:'', password:'', emailErr:'', passwordErr:'' };
  renderApp();
  showToast('Signed out successfully', 'info');
}

function updateLoginForm(field, val) {
  state.loginForm[field] = val;
  state.loginForm[field+'Err'] = '';
}

function updateRegForm(field, val) {
  state.regForm[field] = val;
  state.regForm[field+'Err'] = '';
  if (field === 'password') {
    let s = 0;
    if (val.length >= 8) s++;
    if (/[A-Z]/.test(val)) s++;
    if (/[0-9]/.test(val)) s++;
    state.pwStrength = s;
  }
  renderApp();
}

function handleLogin() {
  const f = state.loginForm;
  let valid = true;
  if (!f.email) { f.emailErr = 'Email is required'; valid = false; }
  if (!f.password) { f.passwordErr = 'Password is required'; valid = false; }
  if (!valid) { renderApp(); return; }

  // Simulate loading
  state.loginLoading = true;
  renderApp();
  setTimeout(() => {
    state.loginLoading = false;
    if (f.email === 'alice@example.com' && f.password === 'password123') {
      state.loggedIn = true;
      state.currentUser = { name:'Alice Johnson', initials:'AJ', color:'#4f46e5' };
      state.page = 'conversations';
      renderApp();
      showToast('Welcome back, Alice! 👋', 'success');
    } else if (f.email && f.password) {
      // Accept any credentials for demo
      state.loggedIn = true;
      state.currentUser = { name:'Demo User', initials:'DU', color:'#7c3aed' };
      state.page = 'conversations';
      renderApp();
      showToast('Signed in successfully', 'success');
    } else {
      f.emailErr = 'Invalid credentials';
      renderApp();
    }
  }, 900);
}

function handleRegister() {
  const f = state.regForm;
  let valid = true;
  if (!f.name.trim())    { f.nameErr = 'Display name is required'; valid = false; }
  if (!f.username.trim()){ f.usernameErr = 'Username is required'; valid = false; }
  else if (!/^[a-zA-Z0-9_]{3,30}$/.test(f.username)) { f.usernameErr = '3–30 chars, letters/numbers/underscores'; valid = false; }
  if (!f.email)          { f.emailErr = 'Email is required'; valid = false; }
  if (!f.password || f.password.length < 8) { f.passwordErr = 'Password must be at least 8 characters'; valid = false; }
  if (!valid) { renderApp(); return; }

  state.regLoading = true;
  renderApp();
  setTimeout(() => {
    state.regLoading = false;
    state.loggedIn = true;
    state.currentUser = { name: f.name, initials: f.name.slice(0,2).toUpperCase(), color:'#7c3aed' };
    state.page = 'conversations';
    renderApp();
    showToast(`Account created! Welcome, ${f.name} 🎉`, 'success');
  }, 1200);
}

function sendFriendRequest(userId) {
  const user = state.users.find(u=>u.id===userId);
  if (!user || user.status !== 'none') return;
  user.status = 'pending_sent';
  renderApp();
  showToast(`Friend request sent to ${user.name}!`, 'success');
  // Simulate the request arriving back (real-time demo)
  setTimeout(() => {
    showToast(`${user.name} received your request`, 'info', 2500);
  }, 1500);
}

function handleAccept(reqId) {
  const req = state.requests.find(r=>r.id===reqId);
  if (!req || req.settled) return;
  req.settled = 'accepted';

  // Update users list
  const user = state.users.find(u=>u.id===req.from.id);
  if (user) user.status = 'friends';

  // Add to conversations
  const existing = state.conversations.find(c=>c.user.id===req.from.id);
  if (!existing) {
    state.conversations.unshift({ id:'c_'+req.from.id, user:req.from, lastMsg:null, time:'now', unread:0, online:req.from.online||false });
    state.messages['c_'+req.from.id] = [];
  }

  renderApp();
  showToast(`You and ${req.from.name} are now friends! 🎉`, 'success');
}

function handleReject(reqId) {
  const req = state.requests.find(r=>r.id===reqId);
  if (!req || req.settled) return;
  req.settled = 'rejected';
  const user = state.users.find(u=>u.id===req.from.id);
  if (user) user.status = 'none';
  renderApp();
  showToast('Request declined', 'info');
}

function selectConv(convId) {
  state.activeConv = convId;
  // Clear unread
  const c = state.conversations.find(c=>c.id===convId);
  if (c) c.unread = 0;
  renderApp();
  setTimeout(scrollMessages, 50);
}

function openConvFromUser(userId) {
  const user = state.users.find(u=>u.id===userId);
  if (!user || user.status !== 'friends') return;
  const existing = state.conversations.find(c=>c.user.id===userId);
  if (existing) {
    state.activeConv = existing.id;
  } else {
    const newId = 'c_'+userId;
    state.conversations.unshift({ id:newId, user, lastMsg:null, time:'now', unread:0, online:user.online });
    state.messages[newId] = [];
    state.activeConv = newId;
  }
  state.page = 'conversations';
  renderApp();
  setTimeout(scrollMessages, 50);
}

let typingTimer = null;
function handleTyping() {
  if (!state.activeConv) return;
  state.showTyping = false; // we're the ones typing, not the other person
}

function sendMessage() {
  const input = document.getElementById('msgInput');
  if (!input || !state.activeConv) return;
  const text = input.value.trim();
  if (!text) return;

  const msgs = state.messages[state.activeConv];
  if (!msgs) return;

  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  msgs.push({ id:'m'+Date.now(), text, sent:true, time, receipts:'✓' });

  // Update last message in conversation list
  const c = state.conversations.find(c=>c.id===state.activeConv);
  if (c) { c.lastMsg = text; c.time = 'now'; }

  input.value = '';
  input.style.height = 'auto';
  renderApp();
  setTimeout(scrollMessages, 30);

  // Simulate delivery receipt
  setTimeout(() => {
    const lastMsg = state.messages[state.activeConv]?.slice(-1)[0];
    if (lastMsg) lastMsg.receipts = '✓✓';
    renderApp();
    scrollMessages();
  }, 800);

  // Simulate typing indicator then reply
  setTimeout(() => {
    state.showTyping = true;
    renderApp();
    scrollMessages();
  }, 1200);

  setTimeout(() => {
    state.showTyping = false;
    const replies = [
      "That's really interesting! Tell me more.",
      "Got it! Thanks for letting me know 👍",
      "Sounds great to me!",
      "I'll check that out. Thanks!",
      "Haha, totally agree 😄",
      "That makes a lot of sense actually.",
    ];
    const reply = replies[Math.floor(Math.random()*replies.length)];
    state.messages[state.activeConv].push({ id:'m'+Date.now(), text:reply, sent:false, time, receipts:'' });
    // Mark our last message as read
    const myMsgs = state.messages[state.activeConv].filter(m=>m.sent);
    if (myMsgs.length > 0) myMsgs[myMsgs.length-1].receipts = '👁';
    if (c) { c.lastMsg = reply; c.time = 'now'; }
    renderApp();
    setTimeout(scrollMessages, 30);
  }, 3000);
}

function scrollMessages() {
  const el = document.getElementById('msgList');
  if (el) el.scrollTop = el.scrollHeight;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ═══════════════════════════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════════════════════════

function renderApp() {
  const app = document.getElementById('app');
  if (!app) return;

  if (!state.loggedIn) {
    app.innerHTML = state.page === 'register' ? renderRegister() : renderLogin();
    return;
  }

  const pageMap = {
    conversations: renderConversations,
    requests:      renderRequests,
    users:         renderUsers,
  };
  const pageContent = (pageMap[state.page] || renderConversations)();

  app.innerHTML = `
    ${renderSidebar()}
    <div class="main-panel">
      ${pageContent}
    </div>`;
}

// Initial render
renderApp();

// ═══════════════════════════════════════════════════════════════════════
// SIMULATE INCOMING FRIEND REQUEST (after 5 seconds for demo)
// ═══════════════════════════════════════════════════════════════════════

setTimeout(() => {
  if (!state.loggedIn) return;
  const newReq = {
    id: 'r_demo',
    from: { id:'u_new', name:'Sam Rivera', handle:'sam_r', color:'#0891b2', initials:'SR', online:true },
    time: 'just now',
    settled: null,
  };
  const existing = state.requests.find(r=>r.id==='r_demo');
  if (existing) return;
  state.requests.unshift(newReq);
  state.requestUnread++;
  renderApp();
  showToast('📨 New friend request from Sam Rivera!', 'info', 4000);
}, 6000);
</script>
